<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5.2wfs图层空间查询</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    let tsMap;
    let wfs;
    let drawTool;

    function init() {
        tsMap = new TsMap();//初始化地图
        drawTool = tsMap.addDraw();
        drawTool.setDrawEndCallback(callbackfun);

        wfs = tsMap.addWfsLayer({
            url: "http://172.16.28.148:6080/geoserver/mysql/ows?service=WFS",//图层url
            layer: "heatmap2000",//图层名称
            featurePrefix: "mysql",//图层命名空间
            featureNS: 'http://www.mysql.net'//图层空间标识符
        });
        wfs.setSpatialQueryCallback(queryCallbackFun);
    }

    function queryCallbackFun(e) {
        console.log(e);
    }

    /**
     * 返回当前绘制的图形
     * @param e
     */
    function callbackfun(e, f) {
        // {coordinate:[[经度,纬度],[经度,纬度],[经度,纬度]]}，长度大于3

        wfs.spatialQueryFromPolygon({coordinate: f.coordinate[0]});


    }

    //{type:
    // Point//绘制点
    // Polygon//绘制多边形
    // Circle//绘制圆
    // RadiusCircle//绘制指定半径的圆圆
    // LineString//绘制线
    function drawFun(type) {
        drawTool.clearFeature();

        switch (type) {
            case 'Point':
                drawTool.drawGraphic("Point");
                break;
            case 'LineString':
                drawTool.drawGraphic("LineString");
                break;
            case 'Polygon':
                drawTool.drawGraphic("Polygon");
                break;
            case 'Box':
                drawTool.drawGraphic("Box");
                break;
            case 'Circle':
                drawTool.drawGraphic("Circle");
                break;
            case 'RadiusCircle':
                drawTool.radius = 10000;//设置半径
                drawTool.drawGraphic("RadiusCircle");
                break;
            case 'Square':
                drawTool.drawGraphic("Square");
                break;
            default:
                drawTool.drawGraphic(null);
                break;
        }

    }

</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>

<button onclick="drawFun('Polygon')">画多边形</button>
<button onclick="drawFun('Box')">矩形</button>
<button onclick="drawFun('Circle')">圆</button>
<button onclick="drawFun('RadiusCircle')">半径圆</button>
</body>
</html>
