<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5.4多个wfs图层空间查询</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    let map;
    let wfs;
    let wfs1;

    function init() {
        tsMap = new TsMap();//初始化地图
        wfs = tsMap.addWfsLayer({
            url: "http://172.16.28.148:6080/geoserver/mysql/ows?service=WFS",//图层url
            layer: "equip",//图层名称
            featurePrefix: "mysql",//图层命名空间
            featureNS: 'http://www.mysql.net'//图层空间标识符
        });
        wfs1 = tsMap.addWfsLayer({
            url: "http://172.16.28.148:6080/geoserver/mysql/ows?service=WFS",
            layer: "polygon",
            featurePrefix: "mysql",
            featureNS: 'http://www.mysql.net'
        });
        wfs.setSpatialQueryCallback(queryFun);
    }
    function queryFun(param) {
        if (param) {
            wfs1.spatialQueryFromPolygon({coordinate:param});
        }
    }
    /**
     * 绘制图形空间查询条件
     * @param type
     * Circle//圆
     * Box//矩形
     * Polygon//多边形
     * RadiusCircle//指定半径的圆
     */
    function spatialQuery(type) {
        switch (type) {
            case 'Polygon':
                wfs.spatialQuery("Polygon");
                break;
            case 'Box':
                wfs.spatialQuery("Box");
                break;
            case 'Circle':
                wfs.spatialQuery("Circle");
                break;
            case 'RadiusCircle':
                wfs.radius = 10000;//设置半径
                wfs.spatialQuery("RadiusCircle");
                break;

        }
    }
    function clearFilter() {
        wfs.spatialQuery();
        wfs1.spatialQuery();
    }

    function clearDraw() {
        wfs.clearDraw();
    }

</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<button onclick="spatialQuery('Circle')">圆空间过滤</button>
<button onclick="spatialQuery('Box')">矩形空间过滤</button>
<button onclick="spatialQuery('Polygon')">多边形空间过滤</button>
<button onclick="spatialQuery('RadiusCircle')">半径圆过滤</button>
<button onclick="clearFilter()">清除过滤条件</button>
<button onclick="clearDraw()">清除绘制的图形</button>
</body>
</html>
