<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>11.1以图标加载点坐标</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
</head>
<script>
    let tsMap = null;
    let gjson = null;

    function init() {
        tsMap = new TsMap();
        tsMap.setMapClickCallback(mcfun);
        gjson = tsMap.addGraphicLayer();


    }


    function mcfun(f, o) {
        if (1) {
            let graphic1 = {
                "geometry": {
                    "type": "Point",
                    "coordinates": o.coordinate
                },

            };
            //显示鼠标位置的点
            feature = gjson.addFeature(graphic1);
        }

    }

    function clearfun() {
        gjson.clear();
    }

    function setcoord() {
        feature.getGeometry().setCoordinates([113, 23]);
    }

    function topfun() {
        gjson.topLayer();
    }
    function chafun() {
        var points = [];
        points.push([113, 23]);
        points.push([113.2, 23]);
        points.push([113.2, 23.2]);
        points.push([113, 23.2]);
        gjson.spatialQueryFromPolygon({coordinate: points});
    }
    function rechafun() {

        let obj = {
            //url: 'img/gd.png',//图片url
            fill: 'rgba(255,204,185,0.1)',//填充颜色
            width: 15,//线宽
            anchor: [0.5, 0.5],
            radius: 1,//点的大小
            color: '#ff11bb',//线颜色
            text:"123456",
            size: 1.0,// 文字的大小
            scale: 0.1,


        };

        gjson.setStyle(obj);
        gjson.spatialQueryFromPolygon();
    }

</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>

<button onclick="chafun()">查询点图层</button>
<button onclick="rechafun()">清空查询</button>

</body>
</html>
