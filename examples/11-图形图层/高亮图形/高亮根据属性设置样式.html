<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>11.6设置图形样式</title>
    <script src="../../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../../dist/js/tsmap.js"></script>
    <script src="../../../static/tsmap.config.js"></script>
</head>
<script>
    let tsMap = null;

    let gjson = null;

    function init() {
        tsMap = new TsMap();
        tsMap.setMapClickCallback(addinfo)
        tsMap.goTo({
            longitude: 113,//经度
            latitude: 23,//纬度
            zoom: 14,//缩放层级
            duration: 3,//飞行到底时间,

            //scale:false
        });
        gjson = tsMap.addGraphicLayer();
        hight = tsMap.addHighlightedLayer()
        let obj = {
            url: '../img/Point.png',//图片url
            scale: 1.5,
            fill: 'rgba(19,224,70,0.87)',//填充颜色
            width: 5,//线宽
            anchor: [0.50, 0.50],
            radius: 10,//圆半径
            color: '#e2b42c'//线颜色
        };
        hight.setStyle(obj);

        //centerFun();
    }
    function addinfo(e, attributes) {

        if (attributes.features.length > 0) {
            // key = attributes.features[0].feature._id;
            hight.addFeature(attributes.features[0].feature);

        } else {
            hight.addFeature();
        }
    }
    let feature;

    function centerFun() {
        let graphic = {
            "geometry": {
                "type": "Point",
                "coordinates": [
                    113.01,
                    23.0
                ]
            },
            "properties": {

                "types": '南沙区'
            }
        }; let graphic1 = {
            "geometry": {
                "type": "Point",
                "coordinates": [
                    113.0,
                    23.0
                ]
            },
            "properties": {

                "types": '海珠区'
            }
        };

        gjson.addFeature(graphic);
        gjson.addFeature(graphic1);

    }

      function setStylefun() {

        var obj = [];
        obj.push({
            url:"expert.png",
            types: '南沙区',
            fill: 'rgba(255,253,26,0.5)',//填充颜色
            width: 5,//线宽
            radius: 50,//圆半径
            color: '#ff11bb'//线颜色
        });

        obj.push({
            url:"zy.png",

            types: '海珠区',
            fill: 'rgba(149,255,63,0.68)',//填充颜色
            width: 5,//线宽
            radius: 50,//圆半径
            color: '#ff11bb'//线颜色
        });

        obj.push({
            fill: 'rgba(240,72,255,0.68)',//填充颜色
            width: 15,//线宽
            radius: 50,//点半径
            color: '#ff11bb'//线颜色
        });
        var object = {
            types: 'types',//根据属性显示不同的样式时属性名称
            //label: 'types',//显示的文字属性
            style: obj,//数组或者对象
            text: {
                color: '#ffffff',
                scale: 5.5,
                offsetX:10,
                offsetY:-10,
            }
        };
        gjson.setStyle(object);

    }
</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<button onclick="centerFun()">json</button>
<button onclick="setStylefun()">设置样式</button>

</body>
</html>
