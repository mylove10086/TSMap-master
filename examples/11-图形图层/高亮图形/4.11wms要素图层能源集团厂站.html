<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../../dist/js/tsmap.js"></script>
    <script src="../../../static/tsmap.config.js"></script>

</head>
<script>
    let tsMap;
    let wms;
    let hight;

    function init() {
        tsMap = new TsMap();//初始化地图
        tsMap.goTo({
            longitude: 113,//经度
            latitude: 23,//纬度
            zoom: 10,//缩放层级
            duration: 3,//飞行到底时间,

            //scale:false
        });

        //tsMap.setBaseMap("blue");
        tsMap.setMapClickCallback(addinfo)
        hight = tsMap.addHighlightedLayer()
        let objgl = {
            url: '../img/Point.png',//图片url
            scale: 1.5,
            fill: 'rgba(19,224,70,0.87)',//填充颜色
            width: 5,//线宽
            anchor: [0.50, 0.50],
            radius: 10,//圆半径
            color: '#e2b42c'//线颜色
        };
        hight.setStyle(objgl);
        wmsLayer2 = tsMap.addWmsLayer({
            //url: "http://localhost:6080/geoserver/wms",//服务地址
            url: "http://172.16.28.160:6080/geoserver/wms",//服务地址
            layer: "shapefile:gssxlayer",//图层命名空间和名称
        });
        wms = tsMap.addWmsFeatureLayer({
            //url: "http://172.16.28.160:6080/geoserver/ics/wms",//服务地址
            url: "http://172.16.28.160:6080/geoserver/nyjt/wms",//服务地址
            layer: "nyjt:t_crawl_ship_new",//图层命名空间和名称
            //cql: "ship_type_id >=70  and ship_type_id <=79 ",//货船
            maxlevel: 5,
            /*  url: "http://172.16.28.160:6080/geoserver/ics/wms",//服务地址
              layer: "ics:ship",//图层命名空间和名称
              cql: "stand_type_code=0 and device_type='traffic_video'",
              maxlevel: 10,*/
        });
        wms.setClickCallback(queryFun);
        let obj1 = {
            url: 'zy.png',//图片url
            scale: 0.3,
            rotationlabel: "hdg",//根据属性设置角度
            fill: 'rgba(255,204,185,0.1)',//填充颜色
            width: 5,//线宽
            anchor: [0.0, 0.0],
            radius: 10,//圆半径
            color: '#ff11bb'//线颜色
        };
        var obj = [];
        obj.push({
            url: 'zy.png',//图片url
            types: 'photovoltaic',
            fill: 'rgba(238,98,33,0.7)',//填充颜色
            width: 1,//线宽
            radius: 50,//圆半径
            color: '#ff11bb'//线颜色
        });
        obj.push({
            url: 'expert.png',//图片url
            types: "wind_power",
            fill: 'rgba(255,255,0,0.75)',//填充颜色
            width: 1,//线宽
            radius: 50,//圆半径
            color: '#ff11bb'//线颜色
        });
        obj.push({
            url: 'Point.png',//图片url
            types: "thermal_power",
            fill: 'rgba(255,255,0,0.75)',//填充颜色
            width: 1,//线宽
            radius: 50,//圆半径
            color: '#ff11bb'//线颜色
        });
        obj.push({
            fill: 'rgba(221,236,236,0.61)',//填充颜色
            width: 1,//线宽
            radius: 50,//点半径
            color: '#ff11bb'//线颜色
        });
        var object = {
            types: 'stand_type_code',//根据属性显示不同的样式时属性名称
            label: 'dispatch_name',//显示的文字属性
            style: obj,//数组或者对象
            text: {
                color: '#ffffff',
                scale: 5.5,
                offsetX: 10,
                offsetY: -10,
            }
        };
        wms.setStyle(object);

    }
    var key;
    function addinfo(e, attributes) {
        if (attributes.features.length > 0) {
            key = attributes.features[0].id;
            hight.addFeature(attributes.features[0].feature);

        } else {
            hight.addFeature();
        }

    }
    function addglid() {
        //hight.addHighFeature("6",wms);
        let graphic = {
            "geometry": {
                "type": "Point",
                "coordinates": [
                    113.,
                    23.0
                ]
            },
            properties: {
                "gid": "adf",//id要有，不然下次就找不到了
                "ship_id": "412470870",
                "ship_from": 0,
                "mmsi": "412470870",
                "ship_type_id": 70,
                "imo": "9084580",
                "ship_name": "H"
            }
        };
        hight.addHighFeature(graphic, wms);//要高亮的要素，创建的wms图层（WmsFeatureLayer）
    }

    function queryFun(e, f, obj) {

        console.log(e, f, obj);

    }


</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<label id="label1"></label>
<button onclick="addglid()">addglid</button>
</body>
</html>
