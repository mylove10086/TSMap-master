<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>11.5指定半径的圆</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
</head>
<script>
    let tsMap = null;

    let gjson = null;

    function init() {
        tsMap = new TsMap({zoom: 9});
        gjson = tsMap.addGraphicLayer();
    }

    let feature;

    function addRadiusCircle() {
        //指定半径的圆
        let graphic = {
            "geometry": {
                "type": "RadiusCircle",
                "coordinates": [
                    113.25966982,
                    23.13177722
                ],
                radius: 50000//半径，默认是100
            },
            "properties": {
                "gid": 1,
                "objectid": 1,
                "id": 5845
            }
        };

        feature = gjson.addFeature(graphic);
        //获取最后添加图形的坐标
        console.log(gjson.getCoordinate())

    }

</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<button onclick="addRadiusCircle()">添加半径圆</button>
</body>
</html>
