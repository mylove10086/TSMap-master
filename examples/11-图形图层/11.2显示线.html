<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>11.2显示线</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
</head>
<script>
    let tsMap = null;

    let gjson = null;

    function init() {
        tsMap = new TsMap();
        gjson = tsMap.addGraphicLayer();
        var style = {
            fill: 'rgba(224,215,34,0.68)',//填充颜色
            width: 20,//线宽
            size: 20,
            color: '#ab0fd7',//线颜色
        };
        // 要先设置样式再添加图形
        gjson.setStyle(style);
    }
    let feature;
    function centerFun() {
        let graphic = {
            "geometry": {
                "type": "LineString",
                "coordinates": [
                    [
                        113, 23
                    ],
                    [
                        113.5, 23
                    ],
                    [
                        113.5, 23.5
                    ],
                    [
                        113, 23.5
                    ],
                    [
                        113, 23
                    ]
                ]
            }
        };
        feature = gjson.addFeature(graphic);

    }
</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<button onclick="centerFun()">添加线数据</button>

</body>
</html>
