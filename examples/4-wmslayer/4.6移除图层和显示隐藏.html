<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    let map;
    let wms;

    function init() {
        tsMap = new TsMap();//初始化地图
        wms = tsMap.addWmsLayer({
            url: 'http://172.16.28.148:6080/geoserver/mysql/wms',//服务地址
            layer: 'mysql:equip'//图层命名空间和名称
        });

    }

    let bo = false;

    function show(e) {
        if (bo) {
            wms.setVisible( bo);
            bo = false;
        } else {
            wms.setVisible( bo);
            bo = true;
        }

    }

    function remove() {
        wms.removeLayer();
    }

    function addlayer() {
        wms.addLayer();
    }

</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<button onclick="show()">显示隐藏</button>
<button onclick="remove()">移除图层</button>
<button onclick="addlayer()">重新添加</button>
</body>
</html>
