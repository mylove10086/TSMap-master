<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
    <script src="../../lib/jquery-3.5.0.js"></script>

</head>
<script>
    let tsMap;
    let wms;

    function init() {
        tsMap = new TsMap();//初始化地图
        //tsMap.setBaseMap("blue");
        tsMap.setMapClickCallback(addinfo)

        wms = tsMap.addWmsFeatureLayer({
            //url: "http://172.16.28.160:6080/geoserver/ics/wms",//服务地址
            url: "http://172.16.28.160:6080/geoserver/nyjt/wms",//服务地址
            layer: "nyjt:t_crawl_new_energy_stand",//图层命名空间和名称
            //cql: "status=0 and device_type='traffic_video'",
            maxlevel: 10,
            /*  url: "http://172.16.28.160:6080/geoserver/ics/wms",//服务地址
              layer: "ics:ship",//图层命名空间和名称
              //cql: "status=0 and device_type='traffic_video'",
              maxlevel: 10,*/
        });
        wms.setClickCallback(queryFun);
        let obj1 = {
            url: 'hdg.png',//图片url
            scale: 0.3,
            rotationlabel: "hdg",//根据属性设置角度
            fill: 'rgba(255,204,185,0.1)',//填充颜色
            width: 5,//线宽
            anchor: [0.0, 0.0],
            radius: 10,//圆半径
            color: '#ff11bb'//线颜色
        };
        var obj = [];
        obj.push({
            url: 'hdg.png',//图片url
            types: 'photovoltaic',
            fill: 'rgba(238,98,33,0.7)',//填充颜色
            width: 1,//线宽
            radius: 50,//圆半径
            color: '#ff11bb'//线颜色
        });
        obj.push({
            types: "wind_power",
            fill: 'rgba(255,255,0,0.75)',//填充颜色
            width: 1,//线宽
            radius: 50,//圆半径
            color: '#ff11bb'//线颜色
        });
        obj.push({
            fill: 'rgba(221,236,236,0.61)',//填充颜色
            width: 1,//线宽
            radius: 50,//点半径
            color: '#ff11bb'//线颜色
        });
        var object = {
            types: 'stand_type_code',//根据属性显示不同的样式时属性名称
            label: 'stand_name',//显示的文字属性
            style: obj,//数组或者对象
            text: {
                color: '#ffffff',
                scale: 0.5,
                offsetX: 10,
                offsetY: -10,
            }
        };
        wms.setStyle(object);

    }

    function addinfo(e, attributes) {
        console.log(attributes);

    }

    function queryFun(e, f, obj) {

        console.log(e, f, obj);

    }

    function query1Fun(e, f, obj) {

        wms.attributeQuery({
            cql: "stand_type_code='wind_power'"
        });

    }

    function clearFun(e, f, obj) {

        wms.attributeQuery();

    }

    function spatialQueryfun() {
        wms.spatialQuery("Circle")
    }


</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<label id="label1"></label>
<button onclick="query1Fun()">qq</button>
<button onclick="clearFun()">cler</button>
<button onclick="spatialQueryfun()">空间查询</button>
</body>
</html>
