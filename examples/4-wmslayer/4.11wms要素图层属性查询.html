<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
    <script src="../../lib/jquery-3.5.0.js"></script>

</head>
<script>
    let tsMap;
    let wms;

    function init() {
        tsMap = new TsMap();//初始化地图
        //tsMap.setBaseMap("blue");

        wms = tsMap.addWmsFeatureLayer({
            //url: "http://172.16.28.160:6080/geoserver/ics/wms",//服务地址
            url: "http://localhost:6080/geoserver/shapefile/wms",//服务地址
            layer: "shapefile:meizhoulabel",//图层命名空间和名称
            //cql: "status=0 and device_type='traffic_video'",
            geom: "the_geom",

            maxlevel: 10,
          /*  url: "http://172.16.28.160:6080/geoserver/ics/wms",//服务地址
            layer: "ics:ship",//图层命名空间和名称
            //cql: "status=0 and device_type='traffic_video'",
            maxlevel: 10,*/
        });
        wms.setClickCallback(queryFun);
        let obj = {
            url: 'hdg.png',//图片url
            scale: 0.3,
            rotationlabel:"hdg",//根据属性设置角度
            fill: 'rgba(255,204,185,0.1)',//填充颜色
            width: 5,//线宽
            anchor: [0.0, 0.0],
            radius: 10,//圆半径
            color: '#ff11bb'//线颜色
        };
        wms.setStyle(obj);

    }

    function queryFun(e, f, obj) {

        console.log(e);

    }
    /**
     * 用于添加过滤条件
     * @param object {condition:'type_id BETWEEN 1000 AND 3000'}
     * condition 当等于null是清除过滤条件，下面是过滤的例子
     *  let condition='type_id BETWEEN 1000 AND 3000'
     *  let condition="address IN ('东莞市大岭山镇大塘朗村湖畔工业园', '东莞市厚街镇桥头村黑山工业区', '东莞市厚街镇新围社区环湖路旁', '东莞市厚街镇双岗管理区官美厦村')"
     *  let condition="type_id >1000 and address like '东莞市*'"
     *  let condition="address like '东莞市%'"
     *  let condition="address = '东莞市大岭山镇大塘朗村湖畔工业园'"
     */
    function query1Fun(e, f, obj) {

        wms.attributeQuery({
            cql: "adcode like '44140%'"
        });

    }


</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<label id="label1"></label>
<button onclick="query1Fun()">qq</button>
</body>
</html>
