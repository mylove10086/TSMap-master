<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4.3wms图层属性查询</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    let map;
    let wms;

    function init() {
        tsMap = new TsMap();//初始化地图
        //http://172.16.28.148:6080/geoserver/mysql/wms?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&
        // FORMAT=image%2Fpng&TRANSPARENT=true&TILED=false&LAYERS=mysql%3Aheatmap&
        // exceptions=application%2Fvnd.ogc.se_inimage&CQL_FILTER=ren%3E95&WIDTH=256&HEIGHT=256&SRS=EPSG%3A4326&STYLES=&BBOX=112.5%2C22.5%2C113.203125%2C23.203125
        wms = tsMap.addWmsLayer({
            //url: "http://localhost:6080/geoserver/wms",//服务地址
            url: "http://172.16.28.148:6080/geoserver/mysql/wms",//服务地址
            //layers: "tiger:poly_landmarks",//图层命名空间和名称
            layer: "mysql:heatmap",//图层命名空间和名称
            cql: "ren>98"
        });
    }

    function spatialQuery(type) {
        /**
         * 用于添加过滤条件
         * @param object {condition:'type_id BETWEEN 1000 AND 3000'}
         * condition 当等于null是清除过滤条件，下面是过滤的例子
         *  let condition='type_id BETWEEN 1000 AND 3000'
         *  let condition="address IN ('东莞市大岭山镇大塘朗村湖畔工业园', '东莞市厚街镇桥头村黑山工业区', '东莞市厚街镇新围社区环湖路旁', '东莞市厚街镇双岗管理区官美厦村')"
         *  let condition="type_id >1000 and address like '东莞市%'"
         *  let condition="address like '东莞市%'"
         *  let condition="address = '东莞市大岭山镇大塘朗村湖畔工业园'"
         */

        let attr = document.getElementById('attr').value;
        let value = document.getElementById('value').value;
        let str = attr + '>' + value;
        wms.attributeQuery({
            cql: str
        });
    }

    function clearFilter() {
        wms.attributeQuery(null);
    }
    //http://localhost:6080/geoserver/shpfile/ows?service=WMS&VERSION=1.1.1&REQUEST=GetMap&FORMAT=json&TRANSPARENT=true&TILED=false&LAYERS=mysql%3Aheatmap&exceptions=application%2Fjson&CQL_FILTER=ren%3E95&WIDTH=256&HEIGHT=256&SRS=EPSG%3A4326&STYLES=&BBOX=113.203125%2C22.5%2C113.90625%2C23.203125
    //http://localhost:6080/geoserver/shpfile/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=shpfile%3Achinamap&maxFeatures=50&outputFormat=application%2Fjson
    //http://localhost:6080/geoserver/shpfile/ows?service=WFS&version=1.0.0&request=GetFeature&typeName=shpfile%3Achinamap&maxFeatures=50&outputFormat=application%2Fjson&CQL_FILTER=num%3E3&BBOX=113.203125%2C22.5%2C113.90625%2C23.203125
    //http://localhost:6080/geoserver/shpfile/ows?service=WMS&SERVICE=WMS&VERSION=1.1.1&REQUEST=GetMap&FORMAT=json&TRANSPARENT=true&TILED=false&LAYERS=shpfile%3Achinamap&exceptions=application%2Fjson&CQL_FILTER=num%3E2&WIDTH=256&HEIGHT=256&SRS=EPSG%3A4326&STYLES=&BBOX=112.5%2C22.5%2C113.90625%2C23.90625
</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<input id="attr" value="ren"><label>></label>
<label>ren是1-100的数</label>
<input id="value" value="95">

<button onclick="spatialQuery('Circle')">属性查询</button>
<button onclick="clearFilter()">清除过滤条件</button>
</body>
</html>
