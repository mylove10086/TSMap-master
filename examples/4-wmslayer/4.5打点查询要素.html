<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
    <script src="../../lib/jquery-3.5.0.js"></script>

</head>
<script>
    let tsMap;
    let wms;

    function init() {
        tsMap = new TsMap();//初始化地图
        wms = tsMap.addWmsLayer({
            url: "http://172.16.28.160:6080/geoserver/tyyj/ows?service=WMS",
            layer: 'tyyj:t_erm_device_geo'//图层命名空间和名称
        });
        tsMap.getMap().on('click', queryFun);
    }
    function queryFun(e) {
        // "http://172.16.28.148:6080/geoserver/mysql/wms?SERVICE=WMS&VERSION=1.1.1&REQUEST=GetFeatureInfo&FORMAT=image%2Fpng&TRANSPARENT=true&QUERY_LAYERS=mysql%3Aequip&TILED=true&LAYERS=mysql%3Aequip&exceptions=application%2Fvnd.ogc.se_inimage&INFO_FORMAT=application%2Fjson&FEATURE_COUNT=50&X=159&Y=149&WIDTH=256&HEIGHT=256&SRS=EPSG%3A4326&STYLES=&BBOX=112.5%2C22.5%2C113.90625%2C23.90625"
        let u = wms.getFeatureInfoUrl({lon: e.coordinate[0], lat: e.coordinate[1]});
        $.ajax({
            type: 'GET',
            url: u,
            success: function (res) {
                console.log(res);
                document.getElementById('label1').innerText = "查询到的要素个数：" + res.features.length;
            }
        });
    }



</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<label id="label1"></label>
</body>
</html>
