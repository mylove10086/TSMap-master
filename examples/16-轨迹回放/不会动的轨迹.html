    function addRoute() {
        tr.addFeature(obj1);
    }

    function addRoutefun() {
        var obj = [];
        for (var i = 0; i < obj1.line.length; i++) {
            obj.push({
                longitude: obj1.line[i].longitude,
                latitude: obj1.line[i].latitude,
            });
        }
        var rs = douglasPeucker(obj, 100);
        console.log(rs);

        var line = [];
        for (var i = 0; i < rs.length; i++) {
            var item = rs[i];
            line.push({
                "latitude": item.y,
                "longitude": item.x
            });
        }
        var route = {
            "name": "",
            "id": "track1",
            line: line
        };
        tr.addFeature(route);

    }

    function stylefun() {

        let obj = {
            size: 4,
            fill: 'rgba(236,8,8,0.5)',//填充颜色
            width: 10,//线宽
            //distance: [0,15],//在那个层级下显示
            anchor: [0.5, 0.5],
            radius: 2,//圆半径
            color: '#f8f1f6',//线颜色
            line: {
                color: '#8316ef',//线颜色
                ocolor: "#de1e1e",//边界颜色
                width: 2,//线宽
            },
            point: {
                surl: "start.png",//起点图片
                eurl: "end.png",//终点图片
                size: 1,
                anchor: [0.5, 0.5],
            }, move: {
                //car: "car.png",//小车
                arrow: "atc.png",//箭头
                size: 0.3,

            }, text: {
                color: '#050000',
                scale: 0.6,
                overflow: true,//设置允许文本超出标签位置处多边形的宽度或所沿路径的长度。
                resolution: 0.005,//在多少分辨率下才显示标注
                offsetX: 0,
                offsetY: 30,
                noffsetX: 0,
                noffsetY: 1,
                background: "rgba(243,245,242,0.7)",//背景色
                stroke: { //边框
                    color: "#ffffff",
                    width: 1
                },
                padding: [1, -1, 1, 1],// 边距
                distance: [0, 200000],
            }

        };

        tr.setStyle(obj);

    }
    function clearfs() {
        tr.clear();
    }
    function visiblefun() {
        tr.setVisible(!tr.getVisible());
    }
