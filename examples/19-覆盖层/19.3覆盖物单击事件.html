<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>19.1添加覆盖物</title>

    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <script src="../../lib/jquery-3.5.0.js"></script>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    let tsMap = null;
    let oll = null;
    let gjson = null;
    let point = null;


    function init() {
        tsMap = new TsMap();
        oll = tsMap.addOverlay();
        oll.setOnClickCallback(funs);

        let ovl = oll.addOverlay({
            anchor:[0.5, 0.5],//图片偏离点击位置的像素
            width: 50,//图片宽度
            height: 50,//图片高度
            position:[113,23],//位置
            //'bottom-left', 'bottom-center', 'bottom-right', 'center-left', 'center-center', 'center-right', 'top-left', 'top-center', and 'top-right'
            positioning: 'center-center',
            url: 'fire1.gif',
            properties:{
                type:"eltsfd"
            }
        });
         oll.addOverlay({
            anchor:[0.5, 0.5],//图片偏离点击位置的像素
            width: 50,//图片宽度
            height: 50,//图片高度
            position:[113,23.1],//位置
            //'bottom-left', 'bottom-center', 'bottom-right', 'center-left', 'center-center', 'center-right', 'top-left', 'top-center', and 'top-right'
            positioning: 'center-center',
            url: 'fire1.gif',
            properties:{
                type:"113.2"
            }
        });

    }

    function funs(o){
        alert(o)
    }


</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<button onclick="showfun()">显示与隐藏</button>
<button onclick="removelayerfun()">移除图层</button>
<button onclick="clearfun()">清空覆盖物</button>
<button onclick="stylefun()">设置样式</button>
<div id="scale"></div>

</body>
</html>
