<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>

    <script src="../../static/tsmap.config.js"></script>
    <script src="../../dist/js/tsmap.js"></script>
</head>
<script>
    var tsMap = null;
    var il = null;


    function init() {
        tsMap = new TsMap();
        il = tsMap.addImageLayer();

    }


    function centerFun() {
        var imgay = {
            coordinate: [113.193807028, 23.2255705437, 113.215602941, 23.2428351955],
            image: []
        };
        var step = 30;
        for (var i = 1; i < 360; i++) {
            //var item = "http://172.16.35.232:7002/data" + step * i + ".png";
            var item = "https://172.16.27.183:8080/map/outimg/data" + step * i + ".png";
            imgay.image.push(item);
        }
        il.addfeature(imgay);

        il.start();
    }

    function currentfun() {
        il.current(200);
    }

    var bo = false;

    function showfun() {
        if (bo) {
            il.setVisible(bo);
            bo = false;
        } else {

            il.setVisible(bo);
            bo = true;
        }

    }

    function removelayerfun() {
        il.removeLayer();
    }

    function raddfun() {
        il.addLayer();
    }


</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<button onclick="centerFun()">修改图片</button>
<button onclick="showfun()">显示隐藏</button>
<button onclick="removelayerfun()">移除</button>
<button onclick="raddfun()">重新添加</button>
<button onclick="ffff()">ffff</button>
<div id="scale"></div>

</body>
</html>
