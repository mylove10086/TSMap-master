<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>天地图驾车线路</title>
    <script type="text/javascript"
            src="http://api.tianditu.gov.cn/api?v=4.0&tk=0c408b2742b51c99f79f0fe2d9b63aa8"></script>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
</head>
<script>
    let tsMap = null;

    let localSearch;

    function init() {
        tsMap = new TsMap();

        localSearch = tsMap.addLocalSearch();
    }

    function cbfun(e) {
        console.log(e);
    }

    function drawPoint() {
        let d = document.getElementById('inp').value;
        localSearch.search({value: d});//开始搜索
    }

    function clearfun() {
        localSearch.clearGeocoder();
    }

    function setStylefun() {
        localSearch.setStyle({
            url: '../data/Point.png',
            anchor: [0.5, 1]
        });
    }
</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<input id="inp" value="广州">
<button onclick="drawPoint()">搜索</button>
<button onclick="setStylefun()">设置样式</button>
<button onclick="clearfun()">清除</button>

</body>
</html>
