<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3.1初始化地图</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
    <script src="data.js"></script>

</head>
<script>
    let tsMap = null
    var oe;

    function init() {
        tsMap = new TsMap({
            target: 'tsMap',
            baseMapLayerType: "img_w"
        });
        oe = tsMap.addFlowLayer();
        var style = {
            fill: 'rgba(224,215,34,0.68)',//填充颜色
            width: 3,//线宽
            size: 20,
            opacity: 0.5,
            color: '#ab0fd7',//线颜色
        };
        // 要先设置样式再添加图形
        oe.setStyle(style);

    }


    function ecmap() {

        var length = data.lineList.length;
        var array=[];
        for (var i = 0; i < length; i++) {
            var item = data.lineList[i];
            let graphic1 = {
                "geometry": {
                    "type": "LineString",
                    "coordinates": item.geometry.coordinates,
                    'color': "#34e39d",
                }
            };
            array.push(graphic1)
        }
        oe.addFeatures(array);


    }


</script>

<body onload="init()">
<div id="tsMap" style="height: 500px"></div>
<button onclick="ecmap()">添加交通图</button>
</body>

</html>
