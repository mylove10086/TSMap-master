<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3.1初始化地图</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
    <script src="kongqidata.js"></script>

</head>
<script>
    let tsMap = null
    var oe;

    function init() {
        tsMap = new TsMap({
            target: 'tsMap',
            baseMapLayerType: "img_w"
        });
        oe = tsMap.addEchartLayer();

    }
    function ecmap(){
        var option = {
            series: [
                {
                    name: 'pm2.5',
                    type: 'scatter',
                    data: convertDatas(kongqidatadata),
                    symbolSize: function (val) {
                        return val[2] / 10;
                    },
                    encode: {
                        value: 2
                    },
                    label: {
                        formatter: '{b}',
                        position: 'right',
                        show: false
                    },
                    emphasis: {
                        label: {
                            show: true
                        }
                    }
                },
                {
                    name: 'Top 5',
                    type: 'effectScatter',
                    data: convertDatas(kongqidatadata.sort(function (a, b) {
                        return b.value - a.value;
                    }).slice(0, 6)),
                    symbolSize: function (val) {
                        return val[2] / 10;
                    },
                    encode: {
                        value: 2
                    },
                    showEffectOn: 'render',
                    rippleEffect: {
                        brushType: 'stroke'
                    },
                    label: {
                        formatter: '{b}',
                        position: 'right',
                        show: true
                    },
                    itemStyle: {
                        shadowBlur: 10,
                        shadowColor: '#333'
                    },
                    emphasis: {
                        scale: true
                    },
                    zlevel: 1
                }
            ]
        };
        oe.addData(option);
        // 三维不可用
        // 注册echarts的事件
        oe._ec.on('click', function (params) {
            alert(params.name);
        })
    }
    function clearfun() {
        oe.clear();
    }

    let bo = false;

    function showfun(e) {
        if (bo) {
            oe.setVisible(bo);
            bo = false;
        } else {
            oe.setVisible(bo);
            bo = true;
        }

    }


</script>

<body onload="init()">
<div id="tsMap" style="height: 500px"></div>
<button onclick="ecmap()">ecmap</button>
<button onclick="clearfun()">clearfun</button>
<button onclick="showfun()">显示隐藏</button>
</body>

</html>
