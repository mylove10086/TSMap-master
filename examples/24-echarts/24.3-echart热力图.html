<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3.1初始化地图</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
    <script src="hangzhou-tracks.js"></script>

</head>
<script>
    let tsMap = null
    var oe;

    function init() {
        tsMap = new TsMap({
            target: 'tsMap',
            baseMapLayerType: "img_w"
        });
        oe = tsMap.addEchartLayer();

    }


    function ecmap() {
        var points = [].concat.apply([], tracks.map(function (track) {
                return track.map(function (seg) {
                    return seg.coord.concat([1]);
                });
            })
        );
        var option = {
            animation: !1,
            visualMap: {
                show: false,
                top: 'top',
                min: 0,
                max: 5,
                seriesIndex: 0,
                calculable: true,
                inRange: {
                    color: ['blue', 'blue', 'green', 'yellow', 'red']
                }
            },
            series: [
                {
                    type: 'heatmap',
                    data: points,
                    pointSize: 5,
                    blurSize: 6
                }
            ]
        };
        oe.addData(option);

    }
    function clearfun() {
        oe.clear();
    }

    let bo = false;

    function showfun(e) {
        if (bo) {
            oe.setVisible(bo);
            bo = false;
        } else {
            oe.setVisible(bo);
            bo = true;
        }

    }


</script>

<body onload="init()">
<div id="tsMap" style="height: 500px"></div>
<button onclick="ecmap()">ecmap</button>
<button onclick="clearfun()">clearfun</button>
<button onclick="showfun()">显示隐藏</button>
</body>

</html>
