<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>21.2加载粤政图</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    let tsMap;
    let yzt;

    function init() {
        tsMap = new TsMap();//初始化地图
        //yzt矢量地图
        yzt = tsMap.addEGisWmtsLayer({
            url: 'http://19.15.70.147:18091/maps-webapp/geography/yzt',//服务地址
            layer: 'vec_c'//图层命名空间和名称
        });

    }
</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
</body>
</html>
