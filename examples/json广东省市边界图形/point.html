<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    let tsMap = null;

    let gjson = null;

    function init() {
         tsMap = new TsMap();

        gjson = tsMap.addGeoJSONLayer();
    }

    function centerFun() {
        gjson.setDataSource({url: 'point.json'});
    }

    function removeLayer() {
        gjson.removeLayer();
    }


</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<button onclick="centerFun()">添加geojson</button>

</body>
</html>
