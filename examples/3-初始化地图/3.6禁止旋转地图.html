<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3.1初始化地图</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    let tsMap;
    function init() {
         tsMap = new TsMap({
            target: 'tsMap',
            baseMapLayerType: "img_w"
        });
    }
    var bol = true;

    function setRotateFun() {
        if (bol) {
            tsMap.setRotate(bol);
            bol = false;
        } else {
            tsMap.setRotate(bol);
            bol = true;
        }

    }
</script>

<body onload="init()">
<div id="tsMap" style="height: 500px"></div>
<button onclick="setRotateFun()">禁止旋转地图</button>
</body>

</html>
