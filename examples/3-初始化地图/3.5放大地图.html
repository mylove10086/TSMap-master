<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3.1初始化地图</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }

        .main-container {
            width: 11520px;
            height: 2160px;

        }

        .map-wrapper {
            position: absolute;
            width: 11520px;
            height: 2160px;
            left1: -6760px;
            top1: -1080px;
            transform: scale(0.5);
        }

        .map-wrapper2 {
            width: 5760px;
            height: 1080px;
            position: absolute;
            left: 2880px;
            top: 540px;
            transform: scale(4);
        }

        .map-layout {
            width: 50%;
            height: 50%;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    function init() {
        let tsMap = new TsMap({
            target: 'tsMap',
            baseMapLayerType: "img_w",
            center: [113.26417, 22.99139],
            zoom: 17
        });

        tsMap.setMaxZoom(15);


    }
</script>

<body onload="init()">
<div id="tsMap" style="height: 800px"></div>
</body>

</html>
