<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>


</head>
<script>
    let tsMap = null;
    let cluster = null;
    let wms = null;


    function init() {
        tsMap = new TsMap();
        tsMap.getMap().setCoordinateCallback(cbfun);//设置地比例尺地图级别图回调函数
        wms = tsMap.addWmsLayer({
            url: 'http://172.16.28.148:6080/geoserver/mysql/wms',//服务地址
            layer: 'mysql:equip'//图层命名空间和名称
        });
        cluster = tsMap.addClusterLayer({
            url: "http://172.16.28.148:6080/geoserver/mysql/ows?service=WFS",//图层url
            layer: "equip",//图层名称
            featurePrefix: "mysql",//图层命名空间
            featureNS: 'http://www.mysql.net'//图层空间标识符
        });
        cluster.setVisible(false);//隐藏高级别的图层

    }

    /**
     * {
        scale: scale,
        coordinate: [],
        zoom: zoom
    };
     * @param e
     */
    function cbfun(e) {
        if (e.zoom > 11) {
            //级别大于11是显示聚合图层隐藏wms图层
            cluster.setVisible(true);
            wms.setVisible(false);

        } else {
            //级别小于11是显示图层隐藏聚合图层
            cluster.setVisible(false);
            wms.setVisible(true);
        }
    }


</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>

</body>
</html>
