<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>9.8图像点聚合图层鼠标事件</title>
  <script src="../../lib/openlayers/ol.js"></script>
  <link rel="stylesheet" href="../../lib/openlayers/ol.css">
  <style>
    .map {
      width: 100%;
      height: 500px;
    }

    a.skiplink {
      position: absolute;
      clip: rect(1px, 1px, 1px, 1px);
      padding: 0;
      border: 0;
      height: 1px;
      width: 1px;
      overflow: hidden;
    }

    a.skiplink:focus {
      clip: auto;
      height: auto;
      width: auto;
      background-color: #fff;
      padding: 0.3em;
    }

    #map:focus {
      outline: #4A74A8 solid 0.15em;
    }
  </style>
  <script src="../../dist/js/tsmap.js"></script>
  <script src="../../static/tsmap.config.js"></script>
  <script src="yjzjxxxxcxfw.js"></script>


</head>
<script>
  let tsMap = null;
  let cluster = null;
  let sein;
  let pop;
  function init() {
    tsMap = new TsMap();

    cluster = tsMap.addClusterLayer();
    cluster.setDistance({distance: 50});//设置聚合半径
    tsMap.setMapClickCallback(mapClickCallback);
    tsMap.getMap().setCoordinateCallback(coordinateCallback);
    stylefun();
    addYjydFun(data.data);
    sein = tsMap.getSelectionIndicator();
     pop = tsMap.getPopupsRight();

  }

  /**
   * 创建鼠标移动时的回调函数
   * @param e
   */
  function coordinateCallback(e) {
    if (e.properties) {
      //应急专家
      if (e.properties.features && e.properties.features.length > 0) {
        if (e.properties.features[0].values_.type === "yjzj") {
          let coordinate = e.coordinate;
          pop.setPosition(coordinate, "", e.properties.features[0].values_.EXPERTTYPE);
        }
      } else {
        pop.setPosition(undefined, "", "");
      }
    } else {
      pop.setPosition(undefined, "", "");
    }

  }

  function mapClickCallback(f, o) {

    if (o.properties) {
      //应急专家
      let object = {};
      if (o.properties.features && o.properties.features.length > 0) {
        if (o.properties.features[0].values_.type === "yjzj") {
          object.EXPERTTYPE = o.properties.EXPERTTYPE;
          object.EXPERTNAME = o.properties.EXPERTNAME;
          object.EXPERTAREA = o.properties.EXPERTAREA;
          object.INSERT_TIME = o.properties.INSERT_TIME;
          let coordinate = o.coordinate;
          sein.setPosition(coordinate);
        }
      } else {
        sein.setPosition(undefined);
      }

    } else {
      sein.setPosition(undefined);
    }
  }

  function addYjydFun(data) {
    var l = data.data.length;
    for (let i = 0; i < l; i++) {
      let item = data.data[i];
      let graphic1 = {
        "geometry": {
          "type": "Point",
          "coordinates": [parseFloat(item.GISLON), parseFloat(item.GISLAT)]
        },
        properties: item
      };
      graphic1.properties.type = "yjzj";
      //显示鼠标位置的点
      cluster.addFeature(graphic1);
    }


  }

  function stylefun() {
    var object = {
      style: [{
        url: '../data/gd.png',//图片url
        fill: 'rgba(240,72,255,0.0)',//填充颜色
        width: 5,//线宽
        anchor: [0.5, 0.9],
        radius: 50,//圆半径
        scale: 0.5,
        color: '#ff11bb'//线颜色
      }, {
        url: '../data/gd.png',//图片url
        fill: 'rgba(240,72,255,0.0)',//填充颜色
        width: 5,//线宽
        anchor: [0.5, 0.9],
        radius: 50,//圆半径
        scale: 0.5,
        color: '#ff11bb'//线颜色
      }]
    };
    cluster.setStyle(object);

  }
  /**
   * 绘制图形空间查询条件
   * @param type
   * Circle//圆
   * Box//矩形
   * Polygon//多边形
   * RadiusCircle//指定半径的圆
   */
  function spatialQuery(type) {
    switch (type) {
      case 'Polygon':
        cluster.spatialQuery("Polygon");
        break;
      case 'Box':
        cluster.spatialQuery("Box");
        break;
      case 'Circle':
        cluster.spatialQuery("Circle");
        break;
      case 'RadiusCircle':
        cluster.radius = 10000;//设置半径
        cluster.spatialQuery("RadiusCircle");
        break;

    }
  }
  function clearfun() {
    cluster.spatialQuery();
  }

  /**
   * 清除绘制的图形
   */
  function clearDraw() {
    cluster.clearDraw()
  }

</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<button onclick="stylefun()">样式</button>

<button onclick="spatialQuery('Polygon')">多边形</button>
<button onclick="spatialQuery('Box')">巨形</button>
<button onclick="spatialQuery('Circle')">圆</button>
<button onclick="spatialQuery('RadiusCircle')">半径圆</button>
<button onclick="clearfun('RadiusCircle')">清空选择</button>
<button onclick="clearDraw('RadiusCircle')">清空绘制的图像</button>

</body>
</html>
