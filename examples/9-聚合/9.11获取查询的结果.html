      color: '#ff11bb'//线颜色
    };
    var object = {

    gjson1.setStyle(object1);


  }

  function mapClickCallback(f, o) {
    gjson1.clear();
    let graphic1 = {
      "geometry": {
        "type": "Point",
        "coordinates": o.coordinate
      }
    };
    gjson1.addFeature(graphic1);

  }

  function addYjydFun(data) {
    var l = data.data.length;
    var ll = [];
    for (let i = 0; i < l; i++) {
      let item = data.data[i];
      let graphic1 = {
        "geometry": {
          "type": "Point",
          "coordinates": [parseFloat(item.GISLON), parseFloat(item.GISLAT)]
        },
        properties: item
      };
      graphic1.properties.type = "yjzj";
      ll.push(graphic1);
      //显示鼠标位置的点
      //cluster.addFeature(graphic1);//加载方式1
    }
    cluster.addFeatures(ll);//加载方式2
  }

  function stylefun() {
