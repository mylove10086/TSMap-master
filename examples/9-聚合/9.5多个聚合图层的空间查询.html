<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>


</head>
<script>
    let tsMap = null;
    let cluster = null;
    let cluster1 = null;


    function init() {
        tsMap = new TsMap();

        //创建聚合图层1
        cluster = tsMap.addClusterLayer({
            url: "http://172.16.28.148:6080/geoserver/mysql/ows?service=WFS",//图层url
            layer: "principal",//图层名称
            featurePrefix: "mysql",//图层命名空间
            featureNS: 'http://www.mysql.net'//图层空间标识符
        });
        //设置聚合图层样式

        var object = {
            style: [{
                fill: 'rgba(98,255,79,0.68)',//填充颜色
                width: 15,//线宽
                radius:10,
                color: '#ff11bb'//线颜色
            }, {
                fill: 'rgba(255,71,56,0.68)',//填充颜色
                width: 15,//线宽
                radius:10,
                color: '#ff11bb'//线颜色
            }]
        };
        cluster.setStyle(object);

        //设置空间查询的回调函数
        cluster.setSpatialQueryCallback(queryFun);
        //创建聚合图层2
        cluster1 = tsMap.addClusterLayer({
            url: "http://172.16.28.148:6080/geoserver/mysql/ows?service=WFS",//图层url
            layer: "equip",//图层名称
            featurePrefix: "mysql",//图层命名空间
            featureNS: 'http://www.mysql.net'//图层空间标识符
        });

    }

    //回调函数
    function queryFun(param, f) {
        if (f) {
            //将查询的多边形用于第二个聚合图层的查询范围
            cluster1.spatialQueryFromPolygon({coordinate: param});
        }
    }

    function spatialQuery(type) {
        switch (type) {
            case 'Circle':
                cluster.spatialQuery("Circle");
                break;
            case 'Box':
                cluster.spatialQuery("Box");
                break;
            case 'Polygon':
                cluster.spatialQuery("Polygon");
                break;
            case 'RadiusCircle':
                cluster.radius = 10000;
                cluster.spatialQuery("RadiusCircle");
                break;
        }
    }

    function clearFilter() {
        cluster.spatialQuery();
        cluster1.spatialQuery();
    }

    function clearDraw() {
        cluster.clearDraw();
    }

    function upRadius() {
        cluster.radius = 100000;
        cluster.updateRadius();
    }


</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>
<button onclick="spatialQuery('Circle')">聚合圆空间过滤</button>
<button onclick="spatialQuery('Box')">聚合矩形空间过滤</button>
<button onclick="spatialQuery('Polygon')">聚合多边形空间过滤</button>
<button onclick="spatialQuery('RadiusCircle')">聚合半径圆过滤</button>
<button onclick="upRadius()">更新半径</button>

<button onclick="clearFilter()">清除过滤条件</button>
<button onclick="clearDraw()">清除绘制的图形</button>

</body>
</html>
