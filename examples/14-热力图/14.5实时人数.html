<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>14.2wfs图层热力图</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
    <script src="../data/heatdata.js"></script>
    <style>
        #grad1 {
            height: 200px;
            width: 30px;
            background-image: linear-gradient(#ff0000, #ffff00, #32e711, #9DEADA);
        }
    </style>
</head>
<script>
    let tsMap = null;
    let hml = null;


    function init() {
        tsMap = new TsMap();
        hml = tsMap.addHeatMapLayer();
    }

    let bl = true;

    function showHeatmap(obj) {
        let coor = [];

        let data = heatdata[obj];

        for (let i = 0; i < data.length; i++) {
            let item = data[i];
            let weight = item.count;
            coor.push({
                coordinate: [item.lon, item.lat],
                weight: weight
            });
        }

        hml.addPints({data: coor});
    }

    function clearfun() {
        hml.clear();
    }
    function clearFilter() {

        let x = document.getElementById('x').value;
        let y = document.getElementById('y').value;
        if(hml){
            hml.setBlur({value:y});
            hml.setRadius({value:x});
        }

    }
</script>
<body onload="init()">
<div id="map" class="map" tabindex="0"></div>
<label>半径</label><input id="x" value="10">
<label>模糊</label><input id="y" value="10">
<button onclick="clearFilter()">设置</button>

<button onclick="showHeatmap('2020/12/21 11:00:00')">2020/12/21 11:00:00实时人数热力图</button>
<button onclick="showHeatmap('2020/12/21 11:05:00')">2020/12/21 11:05:00实时人数热力图</button>
<button onclick="clearfun('2020/12/21 11:05:00')">清除数据</button>

<table >
    <tr>
        <td rowspan="4"  style="width: 20px">
            <div id="grad1"></div>
        </td>
        <td >>100</td>
    </tr>
    <tr>
        <!--<td>2.1</td>-->
        <td>50-100</td>
    </tr>
    <tr>
        <!--<td>3.1</td>-->
        <td>20-50</td>
    </tr>
    <tr>
        <!--<td>3.1</td>-->
        <td><10</td>
    </tr>
</table>
</body>
</html>
