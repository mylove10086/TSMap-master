<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>14.1随机点热力图</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
</head>
<script>
    let tsMap = null;
    let hml = null;

    function init() {
        tsMap = new TsMap();
        tsMap.setBaseMap("vec_c");

        hml = tsMap.addHeatMapLayer();
    }

    function point() {
        let coor = [];
        let x = 110;
        let y = 21;
        let xy = [];
        for (let i = 0; i < 2000; i++) {
            let num1 = Math.random() * 7;
            let num2 = Math.random() * 5;
            let weight = Math.random();
            let num = Math.random() * 100;
            coor.push({
                coordinate: [x + num1, y + num2],
                weight: weight
            });
            var lon = x + num1;
            var lat = y + num2;
            xy.push("" + lon + "|" + lat + "|" + weight + "|" + parseInt(num));
        }
        console.log(xy);

        hml.addPints({data: coor});
    }
</script>
<body onload="init()">
<div id="map" class="map" tabindex="0"></div>
<button onclick="point()">随机点</button>
</body>
</html>
