<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>14.2wfs图层热力图</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
</head>
<script>
    let tsMap = null;
    let hml = null;


    function init() {
        tsMap = new TsMap();
        hml = tsMap.addHeatMapLayer({
            url: "http://172.16.28.148:6080/geoserver/mysql/ows?service=WFS",
            layer: "hazard",
            featurePrefix: "mysql",
            featureNS: 'http://www.mysql.net'
        });
    }

    function clearFilter() {

        let x = document.getElementById('x').value;
        let y = document.getElementById('y').value;
        if(hml){
            hml.setBlur({value:y});
            hml.setRadius({value:x});
        }

    }




</script>
<body onload="init()">
<div id="map" class="map" tabindex="0"></div>
<label>半径</label><input id="x" value="10">
<label>模糊</label><input id="y" value="10">
<button onclick="clearFilter()">设置</button>
</body>
</html>
