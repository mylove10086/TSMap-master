<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 100%;
        }

        a.skiplink {
            position: absolute;
            clip: rect(0px, 0px, 0px, 0px);
            padding: 0;
            border: 0;
            height: 0px;
            width: 0px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.0em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.0em;
        }

        html {
            height: 100%;
        }

        body {
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden;
            padding: 0;
        }

        .fullWindow {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden;
            padding: 0;
            font-family: sans-serif;
        }

        .loadingIndicator {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -33px;
            margin-left: -33px;
            width: 66px;
            height: 66px;
            background-position: center;
            background-repeat: no-repeat;
        }

        .bb {
            position: absolute;
            top: 0;
            left: 0;
        }

    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>


</head>
<script>
    let tsMap;
    let drawTool;
    let gjson;


    function info() {
        tsMap = new TsMap({
            center: [113.26417, 22.99139],
            zoom: 15
        });
        drawTool = tsMap.addDraw();
        drawTool.setDrawEndCallback(funs);// 设置回调函数
        gjson = tsMap.addGraphicLayer();

        var object = {
            style: {
                url: 'img/gd.png',//图片url
                fill: 'rgba(240,72,255,0.5)',//填充颜色
                width: 5,//线宽
                anchor: [0.5, 0.9],
                radius: 50,//圆半径
                scale: 0.5,
                color: '#84fa45'//线颜色
            }
        };
        gjson.setStyle(object);

        tsMap.setMapClickCallback(mapClick);
    }
var manid="菜单";// 用于判断是否是菜单图层的要素
    function mapClick(f, o) {
        var features = o.features;
        for (var i = 0; i < features.length; i++) {
            var item=features[i];
            // "type"是属性名
            if(manid===item.properties["type"]){
                alert("弹出菜单")
            }
        }

    }

    function funs(e, f) {
        let coordinate = f.coordinate[0];
        let lon = -100000000;
        let lat = -100000000;
        // 计算添加到菜单点的坐标
        switch (f.type) {
            case "rectangle":
                let in1 = 0;
                for (let i = 0; i < coordinate.length - 1; i++) {
                    let x = coordinate[i][0];
                    /*if (x > lon && coordinate[i + 1][0] === x) {
                        in1 = i;
                        lon = x;
                    }*/
                    if (x > lon) {
                        in1 = i;
                        lon = x;
                    }
                }
                lon = coordinate[in1][0];
                //lat = (coordinate[in1][1] + coordinate[in1 + 1][1]) / 2.0;
                lat = (coordinate[in1][1]);
                break;
            case "LineString":
                lon = coordinate[0];
                lat = coordinate[1];
                break;
            default:
                for (let i = 0; i < coordinate.length; i++) {
                    let x = coordinate[i][0];
                    if (x >= lon) {
                        lat = coordinate[i][1];
                        lon = x;
                    }
                }
                break;
        }
        let graphic1 = {
            "geometry": {
                "type": "Point",
                "coordinates": [
                    lon,
                    lat
                ]
            },"properties": {
                "type":manid,
            }

        };
        gjson.clear();// 清除原先的菜单
        gjson.addFeature(graphic1);
    }

    function drawFun(type) {
        switch (type) {
            case 'Point':
                drawTool.drawPoint();
                break;
            case 'LineString':
                drawTool.drawLineString();
                break;
            case 'Polygon':
                drawTool.drawPolygon();
                break;
            case 'Box':
                drawTool.drawBox();
                break;
            case 'Circle':
                drawTool.drawCircle();
                break;
            case 'RadiusCircle':
                drawTool.radius = 10000;//设置半径
                drawTool.drawRadiusCircle();
                break;
            case 'Square':
                drawTool.drawSquare();
                break;
            case 'FineArrow':
                drawTool.drawGraphic('FineArrow');
                break;
            case 'AttackArrow':
                drawTool.drawGraphic('AttackArrow');
                break;
            case 'PincerArrow':
                drawTool.drawGraphic('PincerArrow');
                break;
            default:
                drawTool.drawGraphic(null);
                break;
        }
    }

    function getFeature() {
        let f = drawTool.getFeature();
        console.log(f);
        document.getElementById('label1').innerHTML = "图形个数：" + f.length;
    }

    function clearfun() {
        drawTool.clearFeature();
    }

    function shestyleFunRed() {

        var object = {
            style: {
                fill: 'rgba(240,72,255,0.68)',//填充颜色
                width: 5,//线宽
                radius: 50,//圆半径
                color: '#ff11bb'//线颜色
            }
        };
        object = {
            style: {
                fill: 'rgba(240,72,255,0.0)',//填充颜色
                width: 5,//线宽
                color: 'rgba(253,1,9,0.76)',//线颜色
                lineDash: [10, 10]
            }
        };
        drawTool.setStyle(object);
        var object1 = {
            style: {
                fill: 'rgba(240,72,255,0.0)',//填充颜色
                width: 5,//线宽
                radius: 5,
                color: 'rgba(69,255,126,0.5)',//线颜色
                lineDash: [10, 10]
            }
        };
        drawTool.setDrawStyle(object1);
    }

    function shestyleFunYellow() {

        var object = {
            style: {
                fill: 'rgba(240,72,255,0.68)',//填充颜色
                width: 5,//线宽
                radius: 50,//圆半径
                color: '#ff11bb'//线颜色
            }
        };
        object = {
            style: {
                fill: 'rgba(240,72,255,0.0)',//填充颜色
                width: 5,//线宽
                color: 'rgb(253,240,1)',//线颜色
                lineDash: [10, 10]
            }
        };
        drawTool.setStyle(object);
        var object1 = {
            style: {
                fill: 'rgba(240,72,255,0.0)',//填充颜色
                width: 5,//线宽
                radius: 5,
                color: 'rgba(69,255,126,0.5)',//线颜色
                lineDash: [10, 10]
            }
        };
        drawTool.setDrawStyle(object1);
    }

    function shestyleFunGreen() {

        var object = {
            style: {
                fill: 'rgba(240,72,255,0.68)',//填充颜色
                width: 5,//线宽
                radius: 50,//圆半径
                color: '#ff11bb'//线颜色
            }
        };
        object = {
            style: {
                fill: 'rgba(240,72,255,0.0)',//填充颜色
                width: 5,//线宽
                color: 'rgb(18,229,4)',//线颜色
                lineDash: [10, 10]
            }
        };
        drawTool.setStyle(object);
        var object1 = {
            style: {
                fill: 'rgba(240,72,255,0.0)',//填充颜色
                width: 5,//线宽
                radius: 5,
                color: 'rgba(69,255,126,0.5)',//线颜色
                lineDash: [10, 10]
            }
        };
        drawTool.setDrawStyle(object1);
    }

    function radiusFun() {
        let graphic = {
            "geometry": {
                "type": "RadiusCircle",
                "coordinates": [113.4, 23],
                radius: 20000//半径，默认是100
            },
            "properties": {
                "gid": 1,
                "objectid": 1,
                "id": 5845
            }
        };
        drawTool.addFeature(graphic);
    }

</script>
<body onload="info()">
<div id="map" style="width: 100%;height: 600px;"></div>

<label id="label1"></label>
<button onclick="drawFun('Point')">画点</button>
<button onclick="drawFun('LineString')">画线</button>
<button onclick="drawFun('Polygon')">画多边形</button>
<button onclick="drawFun('Box')">矩形</button>
<button onclick="drawFun('Circle')">圆</button>
<button onclick="drawFun('RadiusCircle')">半径圆</button>
<button onclick="drawFun('Square')">矩形1</button>
<button onclick="drawFun('FineArrow')">单箭头</button>
<button onclick="drawFun('AttackArrow')">攻击箭头</button>
<button onclick="drawFun('PincerArrow')">钳击箭头</button>

<button onclick="getFeature()">获取绘制的图形</button>
<button onclick="clearfun()">清除绘制的图形</button>
<button onclick="shestyleFunRed()">样式红色</button>
<button onclick="shestyleFunYellow()">样式黄色</button>
<button onclick="shestyleFunGreen()">样式绿色</button>

<button onclick="radiusFun()">坐标圆</button>


</body>
</html>
