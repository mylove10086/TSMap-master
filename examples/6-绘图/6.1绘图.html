<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 100%;
        }

        a.skiplink {
            position: absolute;
            clip: rect(0px, 0px, 0px, 0px);
            padding: 0;
            border: 0;
            height: 0px;
            width: 0px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.0em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.0em;
        }

        html {
            height: 100%;
        }

        body {
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden;
            padding: 0;
        }

        .fullWindow {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden;
            padding: 0;
            font-family: sans-serif;
        }

        .loadingIndicator {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -33px;
            margin-left: -33px;
            width: 66px;
            height: 66px;
            background-position: center;
            background-repeat: no-repeat;
        }

        .bb {
            position: absolute;
            top: 0;
            left: 0;
        }

    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>


</head>
<script>
  let tsMap;
  let drawTool;

  function info() {
    var dd = ol.verson
    tsMap = new TsMap({
      center: [113.26417, 22.99139],
      zoom: 15
    });
    tsMap.setMapClickCallback(addinfo)

    drawTool = tsMap.addDraw({id: "draw"});
    drawTool.setDrawEndCallback(funs);
    let circle = {
      "geometry": {
        "type": "RadiusCircle",
        "coordinates": [113, 23],
        radius: 100//半径，默认是100
      }
    };
    let coor = tsMap.getCircle(circle);// 获取圆坐标
  }

  function addinfo(e, attributes) {
    //document.getElementById('scale').innerHTML = "   lon:" + attributes.coordinate[0] + " lat:" + attributes.coordinate[1]+"屏幕坐标"+attributes.screen;
    console.log(attributes.screen);


  }

  function funs(e, f) {
    console.log(e);
    console.log(f);
return;
    tsMap.flyTo({
      "coordinates": f.coordinate,
      duration: 3
    });
  }

  //{type:
  // Point//绘制点
  // Polygon//绘制多边形
  // Circle//绘制圆
  // RadiusCircle//绘制指定半径的圆圆
  // LineString//绘制线
  function drawFun2(type) {
    switch (type) {
      case 'Point':
        drawTool.drawGraphic("Point");
        break;
      case 'LineString':
        drawTool.drawGraphic("LineString");
        break;
      case 'Polygon':
        drawTool.drawGraphic("Polygon");
        break;
      case 'Box':
        drawTool.drawGraphic("Box");
        break;
      case 'Circle':
        drawTool.drawGraphic("Circle");
        break;
      case 'RadiusCircle':
        drawTool.radius = 10000;//设置半径
        drawTool.drawGraphic("RadiusCircle");
        break;
      case 'Square':
        drawTool.drawGraphic("Square");
        break;
      case 'FineArrow':
        drawTool.drawGraphic('FineArrow');
        break;
      case 'AttackArrow':
        drawTool.drawGraphic('AttackArrow');
        break;
      case 'PincerArrow':
        drawTool.drawGraphic('PincerArrow');
        break;
      case 'CurveAlgorithm':
        drawTool.drawGraphic('CurveAlgorithm');
        break;  case 'Ellipse':
        drawTool.drawGraphic('Ellipse');
        break;
      default:
        drawTool.drawGraphic(null);
        break;
    }
  }


  function getFeature() {
    let f = drawTool.getFeature();
    console.log(f);
    document.getElementById('label1').innerHTML = "图形个数：" + f.length;
  }

  function clearfun() {
    drawTool.clearFeature();
    drawTool.removeFeature();
  }

  function shestyleFunRed() {

    var object = {

      fill: 'rgba(240,72,255,0.68)',//填充颜色
      width: 5,//线宽
      radius: 50,//圆半径
      color: '#ff11bb'//线颜色

    };
    object = {

      fill: 'rgba(240,72,255,0.0)',//填充颜色
      width: 5,//线宽
      color: 'rgba(253,1,9,0.76)',//线颜色
      lineDash: [10, 10]

    };
    drawTool.setStyle(object);
    var object1 = {

      fill: 'rgba(240,72,255,0.0)',//填充颜色
      width: 5,//线宽
      radius: 5,
      color: 'rgba(69,255,126,0.5)',//线颜色
      lineDash: [10, 10]

    };
    drawTool.setDrawStyle(object1);
  }

  function shestyleFunYellow() {

    var object = {
      style: {
        fill: 'rgba(240,72,255,0.68)',//填充颜色
        width: 5,//线宽
        radius: 50,//圆半径
        color: '#ff11bb'//线颜色
      }
    };
    object = {
      style: {
        fill: 'rgba(240,72,255,0.0)',//填充颜色
        width: 5,//线宽
        color: 'rgb(253,240,1)',//线颜色
        lineDash: [10, 10]
      }
    };
    drawTool.setStyle(object);
    var object1 = {
      style: {
        fill: 'rgba(240,72,255,0.0)',//填充颜色
        width: 5,//线宽
        radius: 5,
        color: 'rgba(69,255,126,0.5)',//线颜色
        lineDash: [10, 10]
      }
    };
    drawTool.setDrawStyle(object1);
  }

  function shestyleFunGreen() {

    var object;
    object = {
      fill: 'rgba(240,72,255,0.0)',//填充颜色
      width: 5,//线宽
      color: 'rgb(18,229,4)',//线颜色
      lineDash: [10, 10]

    };
    drawTool.setStyle(object);
    var object1 = {

      fill: 'rgba(240,72,255,0.0)',//填充颜色
      width: 5,//线宽
      radius: 5,
      color: 'rgba(69,255,126,0.5)',//线颜色
      lineDash: [10, 10]

    };
    drawTool.setDrawStyle(object1);
  }

  function radiusFun() {
    var object = {

      url: 'img/gd.png',//图片url
      fill: 'rgba(240,72,255,0.5)',//填充颜色
      width: 5,//线宽
      anchor: [0.5, 0.9],
      radius: 50,//圆半径
      scale: 1.0,
      color: '#84fa45'//线颜色

    };
    drawTool.setDrawStyle(object);
    drawTool.setStyle(object);

    let graphic = {
      "geometry": {
        "type": "RadiusCircle",
        "coordinates": [113.4, 23],
        radius: 20000//半径，默认是100
      },
      "properties": {
        "gid": 1,
        "objectid": 1,
        "id": 5845
      }
    };
    drawTool.addFeature(graphic);
  }

  let bl = false;

  function showfun() {
    if (bl) {
      drawTool.setVisible(bl);
      bl = false;
    } else {
      drawTool.setVisible(bl);
      bl = true;
    }
  }
</script>
<body onload="info()">
<div id="map" style="width: 100%;height: 700px;"></div>

<label id="label1"></label>
<button onclick="drawFun2('Point')">画点</button>
<button onclick="drawFun2('LineString')">画线</button>
<button onclick="drawFun2('Polygon')">画多边形</button>
<button onclick="drawFun2('Box')">矩形</button>
<button onclick="drawFun2('Circle')">圆</button>
<button onclick="drawFun2('RadiusCircle')">半径圆</button>
<button onclick="drawFun2('Square')">矩形1</button>
<button onclick="drawFun2('FineArrow')">单箭头</button>
<button onclick="drawFun2('AttackArrow')">攻击箭头</button>
<button onclick="drawFun2('PincerArrow')">钳击箭头</button>
<button onclick="drawFun2('CurveAlgorithm')">自由曲线</button>
<button onclick="drawFun2('Ellipse')">椭圆</button>

<button onclick="getFeature()">获取绘制的图形</button>
<button onclick="clearfun()">清除绘制的图形</button>
<button onclick="shestyleFunRed()">样式红色</button>
<button onclick="shestyleFunYellow()">样式黄色</button>
<button onclick="shestyleFunGreen()">样式绿色</button>

<button onclick="radiusFun()">坐标圆</button>
<button onclick="showfun()">图层显示隐藏</button>


</body>
</html>
