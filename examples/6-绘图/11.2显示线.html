<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>11.2显示线</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 100%;
        }

        a.skiplink {
            position: absolute;
            clip: rect(0px, 0px, 0px, 0px);
            padding: 0;
            border: 0;
            height: 0px;
            width: 0px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.0em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.0em;
        }

        html {
            height: 100%;
        }

        body {
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden;
            padding: 0;
        }

        .fullWindow {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden;
            padding: 0;
            font-family: sans-serif;
        }

        .loadingIndicator {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -33px;
            margin-left: -33px;
            width: 66px;
            height: 66px;
            background-position: center;
            background-repeat: no-repeat;
        }

        .bb {
            position: absolute;
            top: 0;
            left: 0;
        }

    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
</head>
<script>
    let tsMap = null;

    let gjson = null;
    let drawTool = null;

    function init() {
        tsMap = new TsMap();
        gjson = tsMap.addGraphicLayer();

        drawTool = tsMap.addDraw();
        drawTool.setDrawEndCallback(funs);
        setstyle();
    }

    var color = 'red';

    function funs(e, f) {
        let graphic = {
            "geometry": {
                "type": "LineString",
                "coordinates": f.coordinate
            },
            "properties": {
                "types": color
            }
        };
        feature = gjson.addFeature(graphic);
        drawTool.clearFeature();

    }


    function setstyle() {
        var obj = [];
        obj.push({
            types: 'blue',
            fill: 'rgba(255,135,41,0.0)',//填充颜色
            width: 5,//线宽
            radius: 50,//圆半径
            color: '#1129ff',//线颜色
            lineDash: [10, 10],
        });
        obj.push({
            types: 'green',
            lineDash: [10, 10],
            fill: 'rgba(129,255,26,0.0)',//填充颜色
            width: 5,//线宽
            radius: 50,//圆半径
            color: '#45ff11'//线颜色
        });
        obj.push({
            types: 'yellow',
            lineDash: [10, 10],
            fill: 'rgba(255,222,55,0.0)',//填充颜色
            width: 5,//线宽
            radius: 50,//圆半径
            color: '#ffe711'//线颜色
        });
        obj.push({
            types: 'red',
            lineDash: [10, 10],
            fill: 'rgba(18,137,109,0.0)',//填充颜色
            width: 5,//线宽
            radius: 50,//圆半径
            color: '#ee0303'//线颜色
        });
        obj.push({
            fill: 'rgba(240,72,255,0.0)',//填充颜色
            lineDash: [10, 10],
            width: 5,//线宽
            radius: 50,//圆半径
            color: '#ef0433'//线颜色
        });
        var object = {
            types: 'types',//根据属性显示不同的样式时属性名称
            //label: 'types',//显示的文字属性
            style: obj,//数组或者对象
            text: {
                color: '#ffffff',
                scale: 5.5,
                offsetX: 10,
                offsetY: -10,
            }
        };
        gjson.setStyle(object);
    }

    function addRedFun() {
        color = 'red';
        drawFun('LineString');
    }

    function addyellowFun() {
        color = 'yellow';
        drawFun('LineString');
    }

    function addblueFun() {
        color = 'blue';
        drawFun('LineString');
    }

    function drawFun(type) {
        switch (type) {
            case 'Point':
                drawTool.drawPoint();
                break;
            case 'LineString':
                drawTool.drawLineString();
                break;
        }
    }
    function clearFun() {
        gjson.clear();

    }
    function showfun() {
        document.getElementById('divs').style.display = "none";
    }
</script>
<body onload="init()">
<div id="map" style="width: 100%;height: 800px;"></div>
<div class="bb" id="divs">

    <!--<button onclick="addRedFun('Point')">画点</button>-->
    <button onclick="addyellowFun('LineString')">黄线</button>
    <button onclick="addRedFun('LineString')">红线</button>
    <button onclick="addblueFun('LineString')">蓝线</button>
    <button onclick="clearFun('LineString')">清空</button>
    <button onclick="showfun()">隐藏绘图</button>

</div>
</body>
</html>
