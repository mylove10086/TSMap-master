<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    let map;
    let wms;
    let drawTool;

    function init() {
        tsMap = new TsMap();//初始化地图
        wms = tsMap.addWmsLayer({
            url: 'http://172.16.28.148:6080/geoserver/mysql/wms',//服务地址
            layer: 'mysql:equip'//图层命名空间和名称
        });
        drawTool = tsMap.addDraw();
        drawTool.setDrawEndCallback(funs);
    }
    function funs(e, f) {
        if (f) {
            // {coordinate:[[经度,纬度],[经度,纬度],[经度,纬度]]}，长度大于等于3
            wms.spatialQueryFromPolygon({coordinate:f.coordinate[0]});//传入经纬度坐标查询图层
        }
    }

    /**
     * 绘制图形空间查询条件
     * @param type
     * Circle//圆
     * Box//矩形
     * Polygon//多边形
     * RadiusCircle//指定半径的圆
     */
    function spatialQuery(type) {
        switch (type) {
            case 'Circle':
                drawTool.drawGraphic("Circle");
                break;
            case 'Box':
                drawTool.drawGraphic("Box");
                break;
            case 'Polygon':
                drawTool.drawGraphic("Polygon");
                break;
            case 'RadiusCircle':
                drawTool.radius = 10000;
                drawTool.drawGraphic("RadiusCircle");
                break;
        }
    }
    function clearFilter() {
        wms.spatialQuery();
        //wms.attributeQuery(null);
    }

    function clearDraw() {
        drawTool.clearDraw();
    }


</script>
<body onload="init()">
<div id="map" style="height: 500px"></div>

<button onclick="spatialQuery('Circle')">wms圆空间过滤</button>
<button onclick="spatialQuery('Box')">wms矩形空间过滤</button>
<button onclick="spatialQuery('RadiusCircle')">半径圆</button>
<button onclick="spatialQuery('Polygon')">wms多边形空间过滤</button>

<button onclick="clearFilter()">清除过滤条件</button>
<button onclick="clearDraw()">清除绘制的图形</button>
</body>
</html>
