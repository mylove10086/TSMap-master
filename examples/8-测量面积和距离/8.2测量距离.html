<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>8.2测量距离</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>
</head>
<script>
    let tsMap = null;
    let query = null;
    let drawTool = null;


    function init() {
        let url = "http://mt2.google.cn/vt/lyrs=y&hl=zh-CN&gl=CN&src=app&x={x}&y={y}&z={z}&s=G";
        //默认使用谷歌地图
        tsMap = new TsMap();
        //var   url = "http://localhost:7080/image/{quadkey}.jpeg";
        url ="http://172.16.27.183:8080/map/tiles/{quadkey}.jpeg";
        //tsMap.setBaseMap("bingmap", {url: url});
        drawTool = tsMap.addMeasure();
        drawTool.tip = true;//是否显示标签

        drawTool.setMouseCallback(callbackfun);//

    }

    function callbackfun(e) {
        document.getElementById('label').innerText = "面积："+e.area;
        document.getElementById('label1').innerText ="长度："+ e.distance;
    }

    function drawFun(type) {
        drawTool.clear();//清除上次绘制的图形
        switch (type) {
            case 'length':
                drawTool.startMeasuring({type: "length"});
                break;
                case 'plength':
                drawTool.startMeasuring({type: "plength"});
                break;
        }

    }

    function arrayCoordinates() {
        let arra = [];
        let lon = 113;
        let lat = 23;

        for (let j = 0; j < 50; j++) {
            arra.push([lon, lat]);
            lat += 0.001;
            lon += 0.001;
        }
        let s = drawTool.getXYLength({coordinate: arra});
        let s1 = tsMap.getXYLength({coordinate: arra});
        console.log(s);
        document.getElementById('label').innerText = s;

    }
    function setStylefun() {
        var object = {
            style: {
                fill: 'rgba(240,72,255,0.68)',//填充颜色
                width: 15,//线宽
                radius: 50,//圆半径
                color: '#ff11bb'//线颜色
            },
            text:{
                fill: 'rgb(4,224,9)',//填充颜色
                color: 'rgb(240,72,255)'//子图颜色
            }
        };
        drawTool.setStyle(object);
        var object1 = {
            style: {
                fill: 'rgba(240,72,255,0.0)',//填充颜色
                width: 5,//线宽
                radius: 20,
                color: 'rgba(69,255,126,0.5)',//线颜色
                lineDash:[10,10]
            }
        };
        drawTool.setDrawStyle(object1);
    }
</script>
<body onload="init()">
<div id="map" class="map" tabindex="0"></div>
<label id="label"></label><br/>

<label id="label1"></label>
<br/>
<br/>
<button onclick="drawFun('length')">测量长度</button>
<button onclick="drawFun('plength')">闭合区的长度</button>
<button onclick="arrayCoordinates()">获取经纬度坐标的距离</button>
<button onclick="setStylefun()">设置样式</button>

</body>
</html>
