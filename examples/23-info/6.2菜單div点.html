<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3.1初始化地图</title>
    <script src="../../lib/openlayers/ol.js"></script>
    <link rel="stylesheet" href="../../lib/openlayers/ol.css">
    <style>
        .map {
            width: 100%;
            height: 500px;
        }

        a.skiplink {
            position: absolute;
            clip: rect(1px, 1px, 1px, 1px);
            padding: 0;
            border: 0;
            height: 1px;
            width: 1px;
            overflow: hidden;
        }

        a.skiplink:focus {
            clip: auto;
            height: auto;
            width: auto;
            background-color: #fff;
            padding: 0.3em;
        }

        #map:focus {
            outline: #4A74A8 solid 0.15em;
        }
    </style>
    <script src="../../dist/js/tsmap.js"></script>
    <script src="../../static/tsmap.config.js"></script>

</head>
<script>
    var tc;
    var pointBillboarl;

    function inits() {
        tsMap = new TsMap({
            target: 'tsMap',
            baseMapLayerType: "img_w"
        });
        tsMap.setBaseMap("autonavi");

        pointBillboarl = tsMap.addPointBillboardLayer();
        pointBillboarl.height = 50000;// 设置地图高度大于多少不显示div
        pointBillboarl.setClickCallback(backfun);

    }

    function backfun(obj) {
        alert("af"+obj.id);
    }
    function addPoint() {
        //填充内容
        var inner = "<img src='menu.png' style='height: 30px;width: 30px;'>";
        let graphic1 = {
            "geometry": {
                "coordinates": [
                    113.0,
                    23.0
                ]
            },
            properties: {
                id: "123",
                div: inner,// 优先使用自定义的div，
            }
        };
        pointBillboarl.addFeature(graphic1);


    }
 function repoint() {

        pointBillboarl.removeFeature("123");


    }


</script>
<body onload="inits()">
<div id="tsMap" style="height: 500px"></div>
<button onclick="addPoint()">添加点</button>
<button onclick="repoint()">repoint</button>
</body>
</html>
